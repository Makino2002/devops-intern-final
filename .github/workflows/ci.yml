name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Yêu cầu bài test: chạy python hello.py
      - name: Run hello.py
        run: |
          python hello.py &
          sleep 3
          curl -f http://localhost:3000 || exit 1
          kill %1

      # Bonus: build + push Docker image tự động
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USER }}/hello-devops:latest .

      - name: Push to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
          docker push ${{ secrets.DOCKER_USER }}/hello-devops:latest
  cd:
    name: CD — Deploy to Vagrant VM
    runs-on: self-hosted
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USER }}/hello-devops:latest

      - name: Start Nomad agent
        run: |
          pkill nomad || true
          sudo nomad agent -dev -bind=0.0.0.0 -log-level=ERROR > /tmp/nomad.log 2>&1 &
          sleep 8

      - name: Deploy with Nomad
        run: nomad job run nomad/hello.nomad

      - name: Verify app is running
        run: |
          sleep 10
          curl -f http://localhost:3000 && echo 'Deploy OK!'
